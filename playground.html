<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패턴 퀴즈 — TS 디자인 패턴</title>
  <meta name="description" content="GoF 디자인 패턴 퀴즈! 코드 상황을 보고 어떤 패턴인지 맞혀보세요.">
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-wrap { max-width: 760px; margin: 0 auto; }
    .progress-bar-wrap {
      height: 6px; background: var(--bg-card); border-radius: 99px;
      margin-bottom: 28px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--gradient-main); transition: width 0.4s ease;
    }
    .quiz-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform:none } }
    .quiz-meta {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .quiz-num {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .quiz-cat {
      padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 700;
    }
    .quiz-question {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; line-height: 1.5;
    }
    .quiz-context {
      font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6;
    }
    .quiz-code {
      background: #0d0d1a; border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      line-height: 1.7; margin-bottom: 20px; overflow-x: auto;
      white-space: pre;
    }
    .choices-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
    }
    .choice-btn {
      padding: 14px 16px; border-radius: 10px; border: 2px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-align: left; transition: all 0.2s; line-height: 1.4;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent-purple); background: rgba(139,92,246,0.1);
    }
    .choice-btn.correct {
      border-color: var(--accent-green); background: rgba(16,185,129,0.15); color: #6ee7b7;
    }
    .choice-btn.wrong {
      border-color: #ef4444; background: rgba(239,68,68,0.1); color: #fca5a5;
    }
    .choice-btn.reveal-correct {
      border-color: var(--accent-green); background: rgba(16,185,129,0.08); opacity: 0.7;
    }
    .feedback-box {
      display: none; padding: 16px 20px; border-radius: 10px; margin-bottom: 16px;
      font-size: 0.92rem; line-height: 1.7;
    }
    .feedback-box.correct  { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
    .feedback-box.wrong    { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
    .feedback-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .hint-box {
      padding: 12px 16px; border-radius: 8px; font-size: 0.85rem;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text-muted); margin-bottom: 16px; cursor: pointer; user-select: none;
    }
    .hint-box:hover { border-color: rgba(139,92,246,0.3); color: var(--text-secondary); }
    .hint-content { display: none; margin-top: 8px; color: var(--accent-cyan); }
    .next-btn {
      display: none; width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--gradient-main); color: white; font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    /* Score screen */
    .score-screen {
      text-align: center; padding: 48px 32px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); display: none;
    }
    .score-emoji { font-size: 4rem; margin-bottom: 16px; }
    .score-num {
      font-size: 3rem; font-weight: 800;
      background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .score-desc { color: var(--text-secondary); margin-bottom: 28px; font-size: 1rem; }
    .review-list { text-align: left; margin-top: 28px; }
    .review-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 8px; margin-bottom: 8px; background: var(--bg-secondary);
      border: 1px solid var(--border); font-size: 0.9rem;
    }
    .review-item.ok  { border-left: 3px solid var(--accent-green); }
    .review-item.bad { border-left: 3px solid #ef4444; }
    .stats-row { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-pill {
      padding: 8px 20px; border-radius: 99px; font-size: 0.9rem; font-weight: 600;
    }
    .stat-pill.green { background: rgba(16,185,129,0.15); color: var(--accent-green); }
    .stat-pill.red   { background: rgba(239,68,68,0.12); color: #f87171; }
    @media(max-width:600px){ .choices-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">⚡ TS 디자인 패턴</a>
    <a href="index.html" class="nav-link">홈</a>
    <a href="ts-concepts.html" class="nav-link">TS 기초</a>
    <a href="patterns.html" class="nav-link">패턴 탐색기</a>
    <a href="playground.html" class="nav-link active">퀴즈</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>🎯 패턴 <span>퀴즈</span></h1>
    <p>코드 상황을 보고 어떤 패턴을 적용하면 좋은지 맞혀보세요! 23문제 도전!</p>
  </div>
</div>

<main class="main">
  <div class="quiz-wrap">

    <!-- 진행 바 -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
      <span id="progressText" style="font-size:0.85rem;color:var(--text-muted);white-space:nowrap;">1 / 23</span>
      <div class="progress-bar-wrap" style="flex:1;">
        <div class="progress-bar-fill" id="progressFill" style="width:4%"></div>
      </div>
      <span id="scoreText" style="font-size:0.85rem;color:var(--accent-green);white-space:nowrap;">✅ 0</span>
    </div>

    <!-- 퀴즈 카드 -->
    <div class="quiz-card" id="quizCard">
      <!-- JS로 렌더링 -->
    </div>

    <!-- 결과 화면 -->
    <div class="score-screen" id="scoreScreen">
      <div class="score-emoji" id="scoreEmoji">🎉</div>
      <div class="score-num" id="scoreFraction"></div>
      <div class="score-desc" id="scoreDesc"></div>
      <div class="stats-row" id="statsRow"></div>
      <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;" onclick="restartQuiz()">🔄 다시 도전!</button>
      <a href="patterns.html" class="btn btn-secondary" style="width:100%;padding:14px;font-size:1rem;margin-top:10px;justify-content:center;">📖 패턴 탐색기에서 복습하기</a>
      <div class="review-list" id="reviewList"></div>
    </div>

  </div>
</main>

<footer class="footer">
  <p>GoF 디자인 패턴 학습 가이드 | TypeScript/JavaScript 초보자를 위해 제작</p>
</footer>

<script>
const QUIZ = [
  // ─── 생성 패턴 ───
  {
    q: '쇼핑몰 설정값이 파일마다 달라져요!',
    context: '여러 파일에서 new ShopConfig()를 호출했더니 어디서는 apiEndpoint가 "localhost", 어디서는 "api.myshop.com"으로 달라집니다.',
    code: `const config1 = new ShopConfig()
const config2 = new ShopConfig()
config1.apiEndpoint = 'https://api.myshop.com'

console.log(config2.apiEndpoint) // 'http://localhost:8080' ← 달라요!`,
    answer: 'Singleton (싱글톤)',
    choices: ['Factory Method (팩토리 메서드)', 'Singleton (싱글톤)', 'Prototype (프로토타입)', 'Builder (빌더)'],
    feedback: '✅ <strong>싱글톤(Singleton)</strong>이 정답입니다!\n\nprivate static instance 하나만 만들면 어디서든 같은 ShopConfig 객체를 사용합니다. getInstance()로만 접근하게 하면 끝!',
    hint: 'static instance를 두고 private 생성자로 외부 new를 막습니다.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'singleton'
  },
  {
    q: '주문 생성자에 파라미터가 6개... 뭐가 뭔지 모르겠어요!',
    context: 'new Order(productId, quantity, address, couponCode, giftWrap, paymentMethod) — 호출 코드만 봐서는 각 인자가 뭔지 알 수 없어요.',
    code: `// 이걸 호출하는 쪽에서 뭐가 뭔지 알 수 없다!
const order = new Order(
  'PROD-001', 2, '서울시 강남구',
  undefined, true, 'card'
)`,
    answer: 'Builder (빌더)',
    choices: ['Prototype (프로토타입)', 'Abstract Factory (추상 팩토리)', 'Builder (빌더)', 'Factory Method (팩토리 메서드)'],
    feedback: '✅ <strong>빌더(Builder)</strong>가 정답입니다!\n\n.product().quantity().shipTo().useCoupon().giftWrap().payWith().place() 처럼 메서드 체이닝으로 단계별로 설정하면 읽기가 훨씬 쉬워집니다!',
    hint: '레고처럼 단계별로 조립 — 메서드 체이닝으로 명확한 이름과 함께 설정.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'builder'
  },
  {
    q: '배송사가 추가될 때마다 createShipping 함수를 직접 수정해야 해요!',
    context: 'CJ, 롯데 외에 한진택배가 추가되면 createShipping 함수의 if/else를 또 열어야 합니다. 개방-폐쇄 원칙을 지킬 수 없을까요?',
    code: `function createShipping(type: string) {
  if (type === 'cj') {
    return { ship: (addr: string) => console.log(\`CJ → \${addr}\`) }
  } else if (type === 'lotte') {
    return { ship: (addr: string) => console.log(\`롯데 → \${addr}\`) }
  }
  // 새 배송사 추가할 때마다 이 함수 수정!
}`,
    answer: 'Factory Method (팩토리 메서드)',
    choices: ['Abstract Factory (추상 팩토리)', 'Strategy (전략)', 'Factory Method (팩토리 메서드)', 'Builder (빌더)'],
    feedback: '✅ <strong>팩토리 메서드(Factory Method)</strong>가 정답입니다!\n\n각 배송사를 Shipping 인터페이스로 구현하고, ShippingFactory를 상속해 createShipping()만 오버라이드합니다. 새 배송사 추가 시 기존 코드를 건드리지 않아도 됩니다!',
    hint: '"어떤 클래스를 만들지"를 서브클래스에 위임 — 객체 생성을 캡슐화합니다.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'factory-method'
  },
  {
    q: 'PC와 모바일 UI가 뒤섞여요! 플랫폼별로 일관된 세트가 필요해요.',
    context: '모바일에서는 상품카드도 모바일, 네비게이션도 모바일이어야 하는데, 지금은 플랫폼 체크가 여기저기 흩어져 있어요.',
    code: `function render(platform: string) {
  if (platform === 'mobile') {
    renderMobileProductCard()
    renderMobileNavBar()
  } else {
    renderPCProductCard()
    renderPCNavBar()
  }
  // 새 플랫폼 추가 → 코드 곳곳을 수정!
}`,
    answer: 'Abstract Factory (추상 팩토리)',
    choices: ['Factory Method (팩토리 메서드)', 'Abstract Factory (추상 팩토리)', 'Bridge (브릿지)', 'Decorator (데코레이터)'],
    feedback: '✅ <strong>추상 팩토리(Abstract Factory)</strong>가 정답입니다!\n\nMobileUIFactory, PCUIFactory처럼 플랫폼별 팩토리를 만들면 createProductCard()와 createNavBar()가 항상 같은 플랫폼 세트를 반환합니다. 앱은 팩토리만 알면 됩니다!',
    hint: '연관된 객체 패밀리를 일관되게 생성 — "모바일이면 전부 모바일".',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'abstract-factory'
  },
  {
    q: '기본 상품을 복사해서 프리미엄 상품을 만들고 싶어요.',
    context: '기본 티셔츠 객체를 복사해 프리미엄 버전을 만들려는데, 속성이 많아 수동 복사가 너무 번거롭습니다.',
    code: `const base = new Product('기본 티셔츠', 29000, '의류', ['면', '기본'])

// 속성을 하나씩 수동으로 복사...
const premium = new Product(
  base.name, base.price, base.category, [...base.tags]
)
premium.name = '프리미엄 티셔츠'
premium.price = 59000`,
    answer: 'Prototype (프로토타입)',
    choices: ['Builder (빌더)', 'Prototype (프로토타입)', 'Singleton (싱글톤)', 'Factory Method (팩토리 메서드)'],
    feedback: '✅ <strong>프로토타입(Prototype)</strong>이 정답입니다!\n\nclone() 메서드를 구현하면 base.clone() 한 줄로 복사 완료! 속성이 늘어나도 clone() 내부만 관리하면 됩니다.',
    hint: '복잡한 객체를 처음부터 만드는 대신 기존 객체를 복사합니다.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'prototype'
  },
  // ─── 구조 패턴 ───
  {
    q: '외부 PG사 SDK 메서드명이 달라 바로 쓸 수 없어요!',
    context: '우리 앱은 pg.pay(amount)를 쓰는데, TossPaymentsSDK는 requestPayment(price, currency) 형식입니다. SDK 코드는 수정 불가예요.',
    code: `// 우리가 원하는 인터페이스
interface PaymentGateway {
  pay(amount: number): void
  refund(orderId: string): void
}

// 외부 SDK (수정 불가!)
class TossPaymentsSDK {
  requestPayment(price: number, currency: string) { ... }
  cancelPayment(txId: string) { ... }
}
// 어떻게 연결할까요?`,
    answer: 'Adapter (어댑터)',
    choices: ['Facade (퍼사드)', 'Bridge (브릿지)', 'Decorator (데코레이터)', 'Adapter (어댑터)'],
    feedback: '✅ <strong>어댑터(Adapter)</strong>가 정답입니다!\n\nTossAdapter를 만들어 pay()를 requestPayment()로 변환합니다. 마치 110V↔220V 어댑터처럼, 기존 코드를 건드리지 않고 연결합니다!',
    hint: '다른 인터페이스를 우리가 원하는 인터페이스로 변환해주는 중간 변환기.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'adapter'
  },
  {
    q: '상품 옵션 조합마다 새 클래스를 만들어야 해서 클래스가 폭발해요!',
    context: '선물포장, 빠른배송 옵션을 조합할 때마다 ProductWithGiftWrap, ProductWithFastShipping, ProductWithBoth... 클래스가 끝없이 늘어납니다.',
    code: `class BasicProduct         { price() { return 29000 } }
class ProductWithGiftWrap  { price() { return 31000 } }
class ProductWithFastShip  { price() { return 32000 } }
class ProductWithBothOpts  { price() { return 34000 } }
// 옵션이 하나 더 생기면? 클래스 수 기하급수 증가!`,
    answer: 'Decorator (데코레이터)',
    choices: ['Composite (컴포지트)', 'Decorator (데코레이터)', 'Strategy (전략)', 'Bridge (브릿지)'],
    feedback: '✅ <strong>데코레이터(Decorator)</strong>가 정답입니다!\n\nGiftWrapDecorator, FastShippingDecorator를 만들어 자유롭게 감싸면 됩니다. new FastShippingDecorator(new GiftWrapDecorator(new BasicProduct())) — 마치 마트료시카처럼!',
    hint: '상속 없이 객체를 감싸서 기능을 동적으로 추가합니다.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'decorator'
  },
  {
    q: '상품 하나 주문하려면 5개 객체를 직접 다 조작해야 해요!',
    context: '주문 버튼을 누르면 재고확인, 쿠폰적용, 결제, 배송예약, 알림 발송을 모두 직접 호출해야 합니다.',
    code: `const inventory = new Inventory(); inventory.check('PROD-001')
const coupon = new CouponService(); coupon.apply('SAVE10')
const payment = new Payment(); payment.charge('card', 29000)
const shipping = new Shipping(); shipping.schedule('서울시 강남구')
const notification = new Notification(); notification.sendEmail('주문 완료!')`,
    answer: 'Facade (퍼사드)',
    choices: ['Facade (퍼사드)', 'Mediator (중재자)', 'Composite (컴포지트)', 'Proxy (프록시)'],
    feedback: '✅ <strong>퍼사드(Facade)</strong>가 정답입니다!\n\nOrderFacade를 만들어 placeOrder() 하나로 모든 것을 처리합니다. 사용자는 내부 복잡성을 몰라도 됩니다!',
    hint: '건물 정면처럼 — 내부 복잡성을 숨기고 단순한 인터페이스만 노출.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'facade'
  },
  {
    q: '같은 상품 정보를 매번 DB에서 조회해 성능이 느려요!',
    context: 'getProduct(id)를 100번 호출하면 100번 DB를 조회합니다. 같은 id라면 한 번만 조회하고 재사용하고 싶어요.',
    code: `class ProductService {
  getProduct(id: string) {
    console.log(\`DB 조회: \${id}\`)
    return db.find(id)
    // 같은 id라도 매번 DB 조회 😱
  }
}`,
    answer: 'Proxy (프록시)',
    choices: ['Decorator (데코레이터)', 'Flyweight (플라이웨이트)', 'Proxy (프록시)', 'Facade (퍼사드)'],
    feedback: '✅ <strong>프록시(Proxy)</strong>가 정답입니다!\n\nCachedProductService를 만들어 Map에 결과를 저장합니다. 같은 인터페이스를 구현하므로 기존 코드를 바꿀 필요 없이 교체할 수 있습니다.',
    hint: '실제 객체 앞에 대리인을 두어 캐싱·접근제어·로깅을 투명하게 추가.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'proxy'

    answer: 'Interpreter (인터프리터)',
    choices: ['Chain of Responsibility (책임 연쇄)', 'Strategy (전략)', 'Interpreter (인터프리터)', 'Composite (컴포지트)'],
    feedback: '✅ <strong>인터프리터(Interpreter)</strong>가 정답입니다!\n\nRateDiscount, FixedDiscount, CombinedDiscount를 각각 클래스로 만들어 재귀적으로 조합합니다. 새 할인 규칙 추가 = 새 클래스만 추가!',
    hint: '문법 규칙을 클래스로 표현 — 재귀적인 언어 구조를 해석합니다.',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'interpreter'
  }
]

let current = 0
let score = 0
let answered = new Array(QUIZ.length).fill(null) // null | 'correct' | 'wrong'

function renderQuiz() {
  const q = QUIZ[current]
  const card = document.getElementById('quizCard')
  card.style.display = 'block'

  const shuffled = [...q.choices].sort(() => Math.random() - 0.5)

  card.innerHTML = `
    <div class="quiz-meta">
      <span class="quiz-num">Q${current + 1} / ${QUIZ.length}</span>
      <span class="quiz-cat ${q.catColor}">${q.cat} 패턴</span>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-context">${q.context}</div>
    <div class="quiz-code">${escHtml(q.code)}</div>

    <div class="choices-grid" id="choicesGrid">
      ${shuffled.map(c => `
        <button class="choice-btn" onclick='selectAnswer(this, ${JSON.stringify(c)})'>
          ${c}
        </button>
      `).join('')}
    </div>

    <div class="hint-box" onclick="toggleHint(this)">
      💡 <strong>힌트 보기</strong> (클릭)
      <div class="hint-content">${q.hint}</div>
    </div>

    <div class="feedback-box" id="feedbackBox"></div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${current < QUIZ.length - 1 ? '다음 문제 →' : '결과 보기 🎯'}
    </button>
  `

  updateProgress()
}

function selectAnswer(btn, choice) {
  if (document.querySelector('.choice-btn.correct, .choice-btn.wrong')) return
  const q = QUIZ[current]
  const isCorrect = choice === q.answer
  const allBtns = document.querySelectorAll('.choice-btn')

  allBtns.forEach(b => {
    b.disabled = true
    if (b.textContent.trim() === q.answer) b.classList.add(isCorrect ? 'correct' : 'reveal-correct')
  })
  btn.classList.add(isCorrect ? 'correct' : 'wrong')

  const fb = document.getElementById('feedbackBox')
  fb.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`
  fb.style.display = 'block'

  if (isCorrect) {
    score++
    answered[current] = 'correct'
    fb.innerHTML = `<div class="feedback-title">🎉 정답!</div>${q.feedback.replace(/\n/g,'<br>')}<br><br>💜 <a href="patterns.html?pattern=${q.patternId}" style="color:var(--accent-purple);">${q.answer} 자세히 보기 →</a>`
  } else {
    answered[current] = 'wrong'
    fb.innerHTML = `<div class="feedback-title">❌ 아쉽지만 틀렸어요.</div><strong>정답: ${q.answer}</strong><br><br>${q.feedback.replace(/\n/g,'<br>')}<br><br>💜 <a href="patterns.html?pattern=${q.patternId}" style="color:var(--accent-purple);">${q.answer} 자세히 보기 →</a>`
  }

  document.getElementById('nextBtn').style.display = 'block'
  document.getElementById('scoreText').textContent = `✅ ${score}`
}

function nextQuestion() {
  current++
  if (current >= QUIZ.length) {
    showScore()
  } else {
    renderQuiz()
  }
}

function updateProgress() {
  const pct = ((current + 1) / QUIZ.length * 100).toFixed(0)
  document.getElementById('progressFill').style.width = pct + '%'
  document.getElementById('progressText').textContent = `${current + 1} / ${QUIZ.length}`
  document.getElementById('scoreText').textContent = `✅ ${score}`
}

function toggleHint(el) {
  const c = el.querySelector('.hint-content')
  c.style.display = c.style.display === 'block' ? 'none' : 'block'
}

function showScore() {
  document.getElementById('quizCard').style.display = 'none'
  document.getElementById('progressFill').style.width = '100%'
  document.getElementById('progressText').textContent = `${QUIZ.length} / ${QUIZ.length}`

  const screen = document.getElementById('scoreScreen')
  screen.style.display = 'block'

  const pct = score / QUIZ.length
  let emoji, desc
  if (pct === 1)       { emoji = '🏆'; desc = '완벽해요! 디자인 패턴 마스터!' }
  else if (pct >= 0.8) { emoji = '🎉'; desc = '훌륭합니다! 거의 다 맞췄어요!' }
  else if (pct >= 0.5) { emoji = '💪'; desc = '절반 이상 맞췄어요. 한 번 더 도전해봐요!' }
  else                  { emoji = '📖'; desc = '패턴 탐색기에서 복습 후 다시 도전!' }

  document.getElementById('scoreEmoji').textContent = emoji
  document.getElementById('scoreFraction').textContent = `${score} / ${QUIZ.length}`
  document.getElementById('scoreDesc').textContent = desc

  const wrong = QUIZ.length - score
  document.getElementById('statsRow').innerHTML = `
    <span class="stat-pill green">✅ 정답 ${score}개</span>
    <span class="stat-pill red">❌ 오답 ${wrong}개</span>
  `

  const reviewHtml = QUIZ.map((q, i) => {
    const ok = answered[i] === 'correct'
    return `
      <div class="review-item ${ok ? 'ok' : 'bad'}">
        <span style="font-size:1.2rem;">${ok ? '✅' : '❌'}</span>
        <div>
          <div style="font-weight:600;font-size:0.88rem;">${q.q}</div>
          <div style="color:var(--text-muted);font-size:0.8rem;">정답: ${q.answer}</div>
        </div>
        <a href="patterns.html?pattern=${q.patternId}" style="margin-left:auto;color:var(--accent-purple);font-size:0.78rem;white-space:nowrap;">복습 →</a>
      </div>`
  }).join('')

  document.getElementById('reviewList').innerHTML = `
    <div style="font-size:0.9rem;font-weight:700;margin-bottom:12px;color:var(--text-secondary);">📋 문제별 결과</div>
    ${reviewHtml}
  `
}

function restartQuiz() {
  current = 0; score = 0
  answered = new Array(QUIZ.length).fill(null)
  document.getElementById('scoreScreen').style.display = 'none'
  document.getElementById('quizCard').style.display = 'block'
  // Shuffle questions
  QUIZ.sort(() => Math.random() - 0.5)
  renderQuiz()
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

document.addEventListener('DOMContentLoaded', () => {
  QUIZ.sort(() => Math.random() - 0.5)
  renderQuiz()
})
</script>
</body>
</html>
