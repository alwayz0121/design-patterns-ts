<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoF 디자인 패턴 탐색기 — TS 디자인 패턴</title>
  <meta name="description" content="GoF 23가지 디자인 패턴을 TypeScript 예제와 Before/After 비교로 학습하세요.">
  <link rel="stylesheet" href="style.css">
  <style>
    .recipe-box {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 16px 20px; border-radius: 12px; margin-bottom: 16px;
      background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.06));
      border: 1px solid rgba(139,92,246,0.2);
    }
    .recipe-part {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; min-width: 86px;
      text-align: center;
    }
    .recipe-part .emoji { font-size: 1.6rem; }
    .recipe-part .label { color: var(--text-secondary); font-size: 0.75rem; line-height: 1.3; }
    .recipe-plus { font-size: 1.4rem; color: var(--text-muted); flex-shrink: 0; }
    .recipe-arrow { font-size: 1.6rem; color: var(--accent-purple); flex-shrink: 0; }
    .recipe-result {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(59,130,246,0.2));
      border: 1px solid rgba(139,92,246,0.5); border-radius: 10px;
      padding: 10px 14px; min-width: 100px; text-align: center;
    }
    .recipe-result .emoji { font-size: 1.8rem; }
    .recipe-result .label { color: #c4b5fd; font-size: 0.75rem; font-weight: 600; }
    .trigger-box {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 10px; margin-bottom: 16px;
      background: rgba(245, 158, 11, 0.08); border: 1px solid rgba(245,158,11,0.25);
      color: #fbbf24; font-size: 0.9rem; line-height: 1.6;
    }
    .trigger-box .ti { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
    /* BAD/GOOD panels */
    .code-panel { border-radius: 12px; overflow: hidden; margin-bottom: 4px; }
    .code-panel-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; font-weight: 700; font-size: 0.95rem;
    }
    .code-panel-header .ph-icon { font-size: 1.4rem; }
    .code-panel-header .ph-sub { font-size: 0.78rem; font-weight: 400; margin-left: 4px; opacity: 0.85; }
    .panel-bad  .code-panel-header { background: rgba(239,68,68,0.18);  color: #fca5a5; border-bottom: 1px solid rgba(239,68,68,0.3); }
    .panel-bad  pre { background: rgba(239,68,68,0.04)!important; border-color: rgba(239,68,68,0.2)!important; border-top: none!important; border-radius: 0 0 10px 10px!important; }
    .panel-good .code-panel-header { background: rgba(16,185,129,0.15); color: #6ee7b7; border-bottom: 1px solid rgba(16,185,129,0.3); }
    .panel-good pre { background: rgba(16,185,129,0.03)!important; border-color: rgba(16,185,129,0.2)!important; border-top: none!important; border-radius: 0 0 10px 10px!important; }
    .panel-bad  { border: 2px solid rgba(239,68,68,0.35);  border-radius: 12px; }
    .panel-good { border: 2px solid rgba(16,185,129,0.35); border-radius: 12px; }
    /* 좌우 나란히 비교 */
    .code-diff-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      align-items: start;
    }
    .code-diff-grid .code-panel pre code { font-size: 0.75rem; }
    @media (max-width: 800px) {
      .code-diff-grid { grid-template-columns: 1fr; }
    }
    /* Web Example Box */
    .web-example-box {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(251,191,36,0.25);
    }
    .web-example-header {
      background: rgba(251,191,36,0.1);
      border-bottom: 1px solid rgba(251,191,36,0.2);
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fbbf24;
      display: flex; align-items: center; gap: 8px;
    }
    .web-example-scenario {
      padding: 12px 16px;
      background: rgba(251,191,36,0.04);
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.65;
      border-bottom: 1px solid rgba(251,191,36,0.12);
    }
    .web-example-code pre {
      margin: 0;
      background: rgba(251,191,36,0.03) !important;
    }
    .web-example-code pre code { display: block; padding: 14px 16px; font-size: 0.78rem; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">⚡ TS 디자인 패턴</a>
    <a href="index.html" class="nav-link">홈</a>
    <a href="ts-concepts.html" class="nav-link">TS 기초</a>
    <a href="patterns.html" class="nav-link active">패턴 탐색기</a>
    <a href="playground.html" class="nav-link">퀴즈</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>🗂️ <span>GoF 디자인 패턴</span> 탐색기</h1>
    <p>23가지 패턴을 TypeScript 코드와 실무 사례로 이해하세요. Before → After 코드 비교로 왜 패턴이 필요한지 체감합니다.</p>
  </div>
</div>

<main class="main">

  <div class="info-box">
    💡 <strong>각 패턴 클릭</strong>으로 상세 설명과 코드를 보고, <strong>Before/After 버튼</strong>으로 리팩토링 전후를 비교해 보세요.
  </div>

  <!-- 검색 + 탭 -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="패턴 이름 검색 (예: Singleton, Observer...)">
  </div>

  <div class="category-pills">
    <div class="pill active-creational" id="pill-all" data-cat="all" onclick="filterCat('all')">전체 (23)</div>
    <div class="pill" id="pill-creational" data-cat="creational" onclick="filterCat('creational')">🏗️ 생성 패턴 (5)</div>
    <div class="pill" id="pill-structural" data-cat="structural" onclick="filterCat('structural')">🔧 구조 패턴 (7)</div>
    <div class="pill" id="pill-behavioral" data-cat="behavioral" onclick="filterCat('behavioral')">🎭 행위 패턴 (11)</div>
  </div>

  <div id="patternsContainer"></div>

</main>

<footer class="footer">
  <p>GoF 디자인 패턴 학습 가이드 | TypeScript/JavaScript 초보자를 위해 제작</p>
</footer>

<script src="patterns-data.js"></script>
<script src="patterns-extras.js"></script>
<script>
const CATEGORY_LABEL = {
  creational: '생성',
  structural: '구조',
  behavioral: '행위'
}
const CATEGORY_COLOR = {
  creational: 'badge-creational',
  structural: 'badge-structural',
  behavioral: 'badge-behavioral'
}

function renderRecipe(id) {
  const extra = PATTERN_EXTRAS[id]
  if (!extra || !extra.recipe) return ''
  const r = extra.recipe
  const parts = r.parts.map((p, i) => {
    const [emoji, ...words] = p.split(' ')
    const label = words.join(' ')
    const plus = i < r.parts.length - 1 ? `<span class="recipe-plus">➕</span>` : ''
    return `<div class="recipe-part"><span class="emoji">${emoji}</span><span class="label">${label}</span></div>${plus}`
  }).join('')
  return `
    <div class="pattern-section-title" style="margin-bottom:10px;">🧪 패턴 조합식</div>
    <div class="recipe-box">
      ${parts}
      <span class="recipe-arrow">⇒</span>
      <div class="recipe-result">
        <span class="emoji">${r.result.split(' ')[0]}</span>
        <span class="label">${r.result.split(' ').slice(1).join(' ')}</span>
      </div>
      <span style="color:var(--text-secondary);font-size:0.82rem;align-self:center;margin-left:4px;">${r.resultDesc}</span>
    </div>`
}

function renderTrigger(id) {
  const extra = PATTERN_EXTRAS[id]
  if (!extra || !extra.trigger) return ''
  return `<div class="trigger-box"><span class="ti">💬</span><span>${extra.trigger}</span></div>`
}

function renderWebExample(id) {
  const extra = PATTERN_EXTRAS[id]
  if (!extra || !extra.webExample) return ''
  const we = extra.webExample
  return `
    <div class="pattern-section-title" style="margin-bottom:10px;">🛒 쇼핑몰에서 이렇게 씁니다</div>
    <div class="web-example-box">
      <div class="web-example-header">🏪 실제 적용 시나리오</div>
      <div class="web-example-scenario">${we.scenario}</div>
      <div class="web-example-code"><pre><code>${escapeHtml(we.code)}</code></pre></div>
    </div>`
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

// highlight() removed — was causing "kw">class artifacts due to regex self-matching

function renderPatterns(filter = 'all', search = '') {
  const container = document.getElementById('patternsContainer')
  const filtered = PATTERNS.filter(p => {
    const catMatch = filter === 'all' || p.category === filter
    const searchMatch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.summary.toLowerCase().includes(search.toLowerCase())
    return catMatch && searchMatch
  })

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:60px 0;">검색 결과가 없습니다.</div>`
    return
  }

  container.innerHTML = filtered.map(p => `
    <div class="pattern-card" id="${p.id}">
      <div class="pattern-header" onclick="togglePattern('${p.id}')">
        <span class="pattern-badge ${CATEGORY_COLOR[p.category]}">${CATEGORY_LABEL[p.category]}</span>
        <div class="pattern-name">${p.name}</div>
        <div class="pattern-summary">${p.summary}</div>
        <span class="pattern-arrow" id="arrow-${p.id}">▶</span>
      </div>
      <div class="pattern-body" id="body-${p.id}">
        <div class="pattern-section">
          ${renderRecipe(p.id)}
          ${renderTrigger(p.id)}
          <div class="pattern-section-title" style="margin-bottom:8px;">🛠️ 실무 사용 예시</div>
          <div style="margin-bottom:12px;">${p.usecases.map(u => `<span class="usecase-tag">${u}</span>`).join('')}</div>
          <div class="pattern-section-title">💡 조금 더 설명하면?</div>
          <p style="color:var(--text-secondary);font-size:0.9rem;">${p.concept}</p>
          ${renderWebExample(p.id)}
        </div>
        <div class="pattern-section">
          <div class="pattern-section-title" style="margin-bottom:12px;">📝 코드 비교 <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">(좌: 문제 코드 / 우: 패턴 적용)</span></div>
          <div class="code-diff-grid">
            <div class="code-panel panel-bad">
              <div class="code-panel-header">
                <span class="ph-icon">❌</span>
                <span>이렇게 짜면 문제가 생겨요</span>
                <button class="code-copy-btn" style="margin-left:auto;position:static;border-color:rgba(239,68,68,0.3);" onclick="copyCodeById('code-before-${p.id}')">복사</button>
              </div>
              ${PATTERN_EXTRAS[p.id]?.before_note ? `<div style="padding:10px 18px;background:rgba(239,68,68,0.06);font-size:0.8rem;color:#fca5a5;border-bottom:1px solid rgba(239,68,68,0.15);line-height:1.5;">${PATTERN_EXTRAS[p.id].before_note}</div>` : ''}
              <pre style="margin:0;"><code id="code-before-${p.id}" style="display:block;padding:16px 18px;">${escapeHtml(p.before.code)}</code></pre>
            </div>
            <div class="code-panel panel-good">
              <div class="code-panel-header">
                <span class="ph-icon">✅</span>
                <span>패턴을 적용하면 이렇게!</span>
                <button class="code-copy-btn" style="margin-left:auto;position:static;border-color:rgba(16,185,129,0.3);" onclick="copyCodeById('code-after-${p.id}')">복사</button>
              </div>
              ${PATTERN_EXTRAS[p.id]?.after_note ? `<div style="padding:10px 18px;background:rgba(16,185,129,0.06);font-size:0.8rem;color:#6ee7b7;border-bottom:1px solid rgba(16,185,129,0.15);line-height:1.5;">${PATTERN_EXTRAS[p.id].after_note}</div>` : ''}
              <pre style="margin:0;"><code id="code-after-${p.id}" style="display:block;padding:16px 18px;">${escapeHtml(p.after.code)}</code></pre>
            </div>
          </div>
          <div style="margin-top:14px;">
            <a href="playground.html" class="btn btn-secondary" style="font-size:0.85rem;padding:8px 18px;display:inline-flex;">🎯 퀴즈로 복습하기</a>
          </div>
        </div>
      </div>
    </div>
  `).join('')
}

function togglePattern(id) {
  const body  = document.getElementById('body-' + id)
  const arrow = document.getElementById('arrow-' + id)
  const isOpen = body.classList.contains('open')
  body.classList.toggle('open', !isOpen)
  arrow.classList.toggle('open', !isOpen)
}

function showCode() {} // removed — panels are now always side-by-side


function copyCodeById(codeId) {
  const el = document.getElementById(codeId)
  const text = el.textContent
  const btn = el.closest('.code-panel').querySelector('.code-copy-btn')
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied') }, 1500)
  })
}

let currentFilter = 'all'
function filterCat(cat) {
  currentFilter = cat
  document.querySelectorAll('.pill').forEach(p => {
    p.className = 'pill'
    if (p.dataset.cat === cat) {
      p.classList.add('active-' + (cat === 'all' ? 'creational' : cat))
    }
  })
  renderPatterns(cat, document.getElementById('searchInput').value)
}

document.addEventListener('DOMContentLoaded', () => {
  renderPatterns()

  document.getElementById('searchInput').addEventListener('input', e => {
    renderPatterns(currentFilter, e.target.value)
  })

  // Handle anchor from home page
  const hash = location.hash.replace('#','')
  if (hash && ['creational','structural','behavioral'].includes(hash)) {
    filterCat(hash)
  }

  // Handle ?pattern= to open specific pattern
  const urlParams = new URLSearchParams(location.search)
  const patternId = urlParams.get('pattern')
  if (patternId) {
    setTimeout(() => {
      const el = document.getElementById(patternId)
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' })
        togglePattern(patternId)
      }
    }, 100)
  }
})
</script>
</body>
</html>
