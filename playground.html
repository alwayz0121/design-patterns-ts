<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패턴 퀴즈 — TS 디자인 패턴</title>
  <meta name="description" content="GoF 디자인 패턴 퀴즈! 코드 상황을 보고 어떤 패턴인지 맞혀보세요.">
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-wrap { max-width: 760px; margin: 0 auto; }
    .progress-bar-wrap {
      height: 6px; background: var(--bg-card); border-radius: 99px;
      margin-bottom: 28px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--gradient-main); transition: width 0.4s ease;
    }
    .quiz-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform:none } }
    .quiz-meta {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .quiz-num {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .quiz-cat {
      padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 700;
    }
    .quiz-question {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; line-height: 1.5;
    }
    .quiz-context {
      font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6;
    }
    .quiz-code {
      background: #0d0d1a; border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      line-height: 1.7; margin-bottom: 20px; overflow-x: auto;
      white-space: pre;
    }
    .choices-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
    }
    .choice-btn {
      padding: 14px 16px; border-radius: 10px; border: 2px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-align: left; transition: all 0.2s; line-height: 1.4;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent-purple); background: rgba(139,92,246,0.1);
    }
    .choice-btn.correct {
      border-color: var(--accent-green); background: rgba(16,185,129,0.15); color: #6ee7b7;
    }
    .choice-btn.wrong {
      border-color: #ef4444; background: rgba(239,68,68,0.1); color: #fca5a5;
    }
    .choice-btn.reveal-correct {
      border-color: var(--accent-green); background: rgba(16,185,129,0.08); opacity: 0.7;
    }
    .feedback-box {
      display: none; padding: 16px 20px; border-radius: 10px; margin-bottom: 16px;
      font-size: 0.92rem; line-height: 1.7;
    }
    .feedback-box.correct  { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
    .feedback-box.wrong    { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
    .feedback-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .hint-box {
      padding: 12px 16px; border-radius: 8px; font-size: 0.85rem;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text-muted); margin-bottom: 16px; cursor: pointer; user-select: none;
    }
    .hint-box:hover { border-color: rgba(139,92,246,0.3); color: var(--text-secondary); }
    .hint-content { display: none; margin-top: 8px; color: var(--accent-cyan); }
    .next-btn {
      display: none; width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--gradient-main); color: white; font-family: 'Outfit', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    /* Score screen */
    .score-screen {
      text-align: center; padding: 48px 32px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); display: none;
    }
    .score-emoji { font-size: 4rem; margin-bottom: 16px; }
    .score-num {
      font-size: 3rem; font-weight: 800;
      background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .score-desc { color: var(--text-secondary); margin-bottom: 28px; font-size: 1rem; }
    .review-list { text-align: left; margin-top: 28px; }
    .review-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 8px; margin-bottom: 8px; background: var(--bg-secondary);
      border: 1px solid var(--border); font-size: 0.9rem;
    }
    .review-item.ok  { border-left: 3px solid var(--accent-green); }
    .review-item.bad { border-left: 3px solid #ef4444; }
    .stats-row { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-pill {
      padding: 8px 20px; border-radius: 99px; font-size: 0.9rem; font-weight: 600;
    }
    .stat-pill.green { background: rgba(16,185,129,0.15); color: var(--accent-green); }
    .stat-pill.red   { background: rgba(239,68,68,0.12); color: #f87171; }
    @media(max-width:600px){ .choices-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">⚡ TS 디자인 패턴</a>

  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>🎯 패턴 <span>퀴즈</span></h1>
    <p>코드 상황을 보고 어떤 패턴을 적용하면 좋은지 맞혀보세요! 10문제 도전!</p>
  </div>
</div>

<main class="main">
  <div class="quiz-wrap">

    <!-- 진행 바 -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
      <span id="progressText" style="font-size:0.85rem;color:var(--text-muted);white-space:nowrap;">1 / 10</span>
      <div class="progress-bar-wrap" style="flex:1;">
        <div class="progress-bar-fill" id="progressFill" style="width:10%"></div>
      </div>
      <span id="scoreText" style="font-size:0.85rem;color:var(--accent-green);white-space:nowrap;">✅ 0</span>
    </div>

    <!-- 퀴즈 카드 -->
    <div class="quiz-card" id="quizCard">
      <!-- JS로 렌더링 -->
    </div>

    <!-- 결과 화면 -->
    <div class="score-screen" id="scoreScreen">
      <div class="score-emoji" id="scoreEmoji">🎉</div>
      <div class="score-num" id="scoreFraction"></div>
      <div class="score-desc" id="scoreDesc"></div>
      <div class="stats-row" id="statsRow"></div>
      <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;" onclick="restartQuiz()">🔄 다시 도전!</button>
      <a href="patterns.html" class="btn btn-secondary" style="width:100%;padding:14px;font-size:1rem;margin-top:10px;justify-content:center;">📖 패턴 탐색기에서 복습하기</a>
      <div class="review-list" id="reviewList"></div>
    </div>

  </div>
</main>

<footer class="footer">
  <p>GoF 디자인 패턴 학습 가이드 | TypeScript/JavaScript 초보자를 위해 제작</p>
</footer>

<script>
const QUIZ = [
  {
    q: '매번 new AppConfig()를 하니 설정값이 제각각 달라요!',
    context: '여러 파일에서 new AppConfig()를 호출했더니 어디서는 dbUrl이 "localhost", 어디서는 "production"으로 달라집니다.',
    code: `// 문제 코드
const config1 = new AppConfig()
const config2 = new AppConfig()
config1.dbUrl = 'production'

console.log(config2.dbUrl) // 'localhost' ← 달라요!`,
    answer: 'Singleton (싱글톤)',
    choices: ['Factory Method (팩토리 메서드)', 'Singleton (싱글톤)', 'Prototype (프로토타입)', 'Builder (빌더)'],
    feedback: '✅ <strong>싱글톤(Singleton)</strong>이 정답입니다!\n\nprivate static instance 하나만 만들면 어디서든 <em>같은</em> Config 객체를 사용합니다. getInstance()로만 접근하게 하면 끝!',
    hint: '이 패턴은 클래스에 static instance를 두고, private 생성자로 외부 new를 막습니다.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'singleton'
  },
  {
    q: '결제 수단마다 if/else 블록이 점점 길어져요!',
    context: '카드, 카카오, 네이버 결제가 추가될 때마다 checkout 함수에 else if를 붙이고 있습니다. 계속 이렇게 해야 하나요?',
    code: `function checkout(method: string, amount: number) {
  if (method === 'card') { /* 카드 처리 */ }
  else if (method === 'kakao') { /* 카카오 처리 */ }
  else if (method === 'naver') { /* 네이버 처리 */ }
  // 새 결제 추가할 때마다 이 파일 수정!
}`,
    answer: 'Strategy (전략)',
    choices: ['Observer (옵저버)', 'Command (커맨드)', 'Strategy (전략)', 'State (상태)'],
    feedback: '✅ <strong>전략(Strategy)</strong>이 정답입니다!\n\n각 결제 방법을 PaymentStrategy 인터페이스를 구현하는 클래스로 분리하면, 새 결제 추가 시 기존 코드를 건드리지 않아도 됩니다.',
    hint: '알고리즘(결제 방법)을 교체 가능한 객체로 캡슐화합니다.',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'strategy'
  },
  {
    q: '상태 변화를 여러 컴포넌트에 일일이 알려줘야 해요!',
    context: '주식 가격이 바뀌면 차트, 알림, 로그 세 곳을 직접 업데이트 해야 합니다. 구독자가 늘어날수록 setPrice 함수가 거대해져요.',
    code: `setPrice(price: number) {
  this.price = price
  chartComponent.update(price)      // 직접 호출
  notificationService.send(price)   // 직접 호출
  logService.record(price)          // 직접 호출
  // 새 구독자 → 여기를 또 수정...
}`,
    answer: 'Observer (옵저버)',
    choices: ['Mediator (중재자)', 'Observer (옵저버)', 'Chain of Responsibility (책임 연쇄)', 'Command (커맨드)'],
    feedback: '✅ <strong>옵저버(Observer)</strong>가 정답입니다!\n\nsubscribe(), notify()로 구독자를 자동으로 통지합니다. 새 구독자 추가 시 기존 코드를 수정할 필요가 없습니다!',
    hint: '유튜브 채널 구독처럼 — 새 영상(이벤트) 발생 시 구독자에게 자동 알림.',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'observer'
  },
  {
    q: 'LoggerAdapter 객체를 만들어야 하는데, 외부 라이브러리 인터페이스가 달라요!',
    context: '우리 앱은 logger.log(msg)를 쓰는데, 외부 라이브러리는 logger.writeLog("INFO", msg) 형식입니다. 라이브러리 코드는 수정 불가예요.',
    code: `// 우리가 원하는 인터페이스
interface Logger { log(msg: string): void }

// 외부 라이브러리 (수정 불가!)
class ThirdPartyLogger {
  writeLog(level: string, msg: string) { ... }
}
// 어떻게 연결할까요?`,
    answer: 'Adapter (어댑터)',
    choices: ['Facade (퍼사드)', 'Bridge (브릿지)', 'Decorator (데코레이터)', 'Adapter (어댑터)'],
    feedback: '✅ <strong>어댑터(Adapter)</strong>가 정답입니다!\n\n중간에 LoggerAdapter 클래스를 만들어 log() 호출을 writeLog() 호출로 변환합니다. 마치 110V↔220V 어댑터처럼요!',
    hint: '다른 인터페이스를 우리가 원하는 인터페이스로 변환해주는 중간 변환기.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'adapter'
  },
  {
    q: '텍스트 에디터에서 Ctrl+Z Undo 기능을 구현하려면?',
    context: '사용자가 글을 입력하거나 삭제할 때마다 이전 상태로 되돌릴 수 있어야 합니다. 어떤 패턴이 이 구조에 딱 맞을까요?',
    code: `class Editor {
  content = ''

  // 이 작업들을 Undo 가능하게 만들고 싶어요
  type(text: string) { this.content += text }
  delete(n: number)  { this.content = this.content.slice(0, -n) }

  // Undo 어떻게 구현하지?
}`,
    answer: 'Command (커맨드)',
    choices: ['Memento (메멘토)', 'Command (커맨드)', 'Iterator (이터레이터)', 'State (상태)'],
    feedback: '✅ <strong>커맨드(Command)</strong>가 정답입니다!\n\n각 동작(type, delete)을 Command 객체로 만들어 execute()와 undo()를 함께 저장합니다. history 스택에 쌓아두면 Undo가 쉽게 구현됩니다!',
    hint: '"요청을 객체로" — execute()와 undo()를 하나의 객체로 캡슐화합니다.',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'command'
  },
  {
    q: '영화를 보려면 TV, 스피커, 플레이어를 모두 직접 켜야 해요!',
    context: '사용자가 theater.watchMovie()만 호출하면 알아서 준비되었으면 좋겠어요. 현재는 5개 객체를 직접 조작해야 합니다.',
    code: `// 현재: 사용자가 다 알아야 함
const tv = new TV(); tv.on()
const speaker = new Speaker(); speaker.on(); speaker.setVolume(30)
const lights = new Lights(); lights.dim(20)
const player = new BluRay(); player.on(); player.play('movie')

// 원하는 모습:
theater.watchMovie('어벤져스') // 한 줄!`,
    answer: 'Facade (퍼사드)',
    choices: ['Facade (퍼사드)', 'Mediator (중재자)', 'Composite (컴포지트)', 'Proxy (프록시)'],
    feedback: '✅ <strong>퍼사드(Facade)</strong>가 정답입니다!\n\n복잡한 서브시스템 앞에 단순한 창구를 제공합니다. 내부 복잡성을 숨기고 watchMovie() 하나로 모든 것을 처리합니다.',
    hint: '건물 정면처럼 — 내부 복잡성을 숨기고 단순한 인터페이스만 노출.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'facade'
  },
  {
    q: '생성자에 파라미터가 8개... 뭐가 뭔지 모르겠어요!',
    context: 'new Email(to, from, subject, body, cc, bcc, isHtml, attachments) — 호출 코드만 봐서는 순서를 알 수가 없어요.',
    code: `// 이걸 호출하는 쪽에서 뭐가 뭔지 알 수 없다!
const email = new Email(
  'to@a.com', 'from@b.com', '제목', '내용',
  undefined, undefined, true, ['doc.pdf']
)`,
    answer: 'Builder (빌더)',
    choices: ['Prototype (프로토타입)', 'Abstract Factory (추상 팩토리)', 'Builder (빌더)', 'Factory Method (팩토리 메서드)'],
    feedback: '✅ <strong>빌더(Builder)</strong>가 정답입니다!\n\n.to().from().subject().body().asHtml().attach().send() 처럼 메서드 체이닝으로 단계별로 설정하면 읽기가 훨씬 쉬워집니다!',
    hint: '레고처럼 단계별로 조립 — 메서드 체이닝으로 명확한 이름과 함께 설정.',
    cat: '생성', catColor: 'badge-creational',
    patternId: 'builder'
  },
  {
    q: 'DB를 매번 조회하면 느린데, 어떻게 최적화할까요?',
    context: 'getUser(id)를 100번 호출하면 100번 DB를 조회합니다. 같은 id라면 한 번만 조회하고 재사용하고 싶어요.',
    code: `class UserService {
  getUser(id: string) {
    console.log(\`DB 조회: \${id}\`)
    return db.find(id)
    // 같은 id라도 매번 DB 조회 😱
  }
}`,
    answer: 'Proxy (프록시)',
    choices: ['Decorator (데코레이터)', 'Flyweight (플라이웨이트)', 'Proxy (프록시)', 'Facade (퍼사드)'],
    feedback: '✅ <strong>프록시(Proxy)</strong>가 정답입니다!\n\nCachedUserService를 만들어 Map에 결과를 저장합니다. 같은 인터페이스를 구현하므로 기존 코드를 바꿀 필요 없이 교체할 수 있습니다.',
    hint: '실제 객체 앞에 대리인을 두어 캐싱·접근제어·로깅을 투명하게 추가.',
    cat: '구조', catColor: 'badge-structural',
    patternId: 'proxy'
  },
  {
    q: 'CSV와 JSON 파서가 과정은 똑같은데 한 단계만 다를 때!',
    context: '데이터 읽기 → 파싱 → 집계 순서는 같고, "파싱" 단계만 CSV/JSON마다 다릅니다. 중복 코드를 없앨 수 있을까요?',
    code: `// 중복 코드
class CSVParser {
  parse(data: string) {
    const raw = data         // 읽기 (동일)
    const nums = raw.split(',').map(Number) // CSV 전용
    return nums.reduce((a,b)=>a+b) // 집계 (동일)
  }
}
class JSONParser {
  parse(data: string) {
    const raw = data         // 읽기 (동일) ← 중복!
    const nums = JSON.parse(raw) // JSON 전용
    return nums.reduce((a:number,b:number)=>a+b) // 집계 (동일) ← 중복!
  }
}`,
    answer: 'Template Method (템플릿 메서드)',
    choices: ['Strategy (전략)', 'Abstract Factory (추상 팩토리)', 'Template Method (템플릿 메서드)', 'Bridge (브릿지)'],
    feedback: '✅ <strong>템플릿 메서드(Template Method)</strong>가 정답입니다!\n\n부모 클래스에서 parse()의 순서를 고정하고, parseData() abstract 메서드만 서브클래스에서 다르게 구현합니다. 공통 코드는 한 곳에!',
    hint: '레시피(순서)는 고정, 재료(세부 구현)만 서브클래스에서.",',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'template-method'
  },
  {
    q: '주문 상태마다 동작이 달라 if/else가 복잡해요!',
    context: '주문이 "결제대기" → "결제완료" → "배송중" → "배송완료"로 변할수록, handle() 함수의 if/else가 끝없이 늘어납니다.',
    code: `handle(action: string) {
  if (this.status === '결제대기') {
    if (action === 'pay') { ... }
  } else if (this.status === '결제완료') {
    if (action === 'ship') { ... }
    if (action === 'cancel') { ... }
  }
  // 상태가 늘수록 if 블록이 폭발...
}`,
    answer: 'State (상태)',
    choices: ['Strategy (전략)', 'Command (커맨드)', 'Observer (옵저버)', 'State (상태)'],
    feedback: '✅ <strong>상태(State)</strong>가 정답입니다!\n\n각 상태(결제대기, 배송중 등)를 별도의 클래스로 만들고, 상태 전환 시 객체를 교체합니다. if/else 없이 동작이 자동으로 바뀝니다!',
    hint: '상태 자체를 객체로 — 상태가 바뀌면 다른 클래스의 동작이 실행됩니다.',
    cat: '행위', catColor: 'badge-behavioral',
    patternId: 'state'
  }
]

let current = 0
let score = 0
let answered = new Array(QUIZ.length).fill(null) // null | 'correct' | 'wrong'

function renderQuiz() {
  const q = QUIZ[current]
  const card = document.getElementById('quizCard')
  card.style.display = 'block'

  const shuffled = [...q.choices].sort(() => Math.random() - 0.5)

  card.innerHTML = `
    <div class="quiz-meta">
      <span class="quiz-num">Q${current + 1} / ${QUIZ.length}</span>
      <span class="quiz-cat ${q.catColor}">${q.cat} 패턴</span>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-context">${q.context}</div>
    <div class="quiz-code">${escHtml(q.code)}</div>

    <div class="choices-grid" id="choicesGrid">
      ${shuffled.map(c => `
        <button class="choice-btn" onclick='selectAnswer(this, ${JSON.stringify(c)})'>
          ${c}
        </button>
      `).join('')}
    </div>

    <div class="hint-box" onclick="toggleHint(this)">
      💡 <strong>힌트 보기</strong> (클릭)
      <div class="hint-content">${q.hint}</div>
    </div>

    <div class="feedback-box" id="feedbackBox"></div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${current < QUIZ.length - 1 ? '다음 문제 →' : '결과 보기 🎯'}
    </button>
  `

  updateProgress()
}

function selectAnswer(btn, choice) {
  if (document.querySelector('.choice-btn.correct, .choice-btn.wrong')) return
  const q = QUIZ[current]
  const isCorrect = choice === q.answer
  const allBtns = document.querySelectorAll('.choice-btn')

  allBtns.forEach(b => {
    b.disabled = true
    if (b.textContent.trim() === q.answer) b.classList.add(isCorrect ? 'correct' : 'reveal-correct')
  })
  btn.classList.add(isCorrect ? 'correct' : 'wrong')

  const fb = document.getElementById('feedbackBox')
  fb.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`
  fb.style.display = 'block'

  if (isCorrect) {
    score++
    answered[current] = 'correct'
    fb.innerHTML = `<div class="feedback-title">🎉 정답!</div>${q.feedback.replace(/\n/g,'<br>')}<br><br>💜 <a href="patterns.html?pattern=${q.patternId}" style="color:var(--accent-purple);">${q.answer} 자세히 보기 →</a>`
  } else {
    answered[current] = 'wrong'
    fb.innerHTML = `<div class="feedback-title">❌ 아쉽지만 틀렸어요.</div><strong>정답: ${q.answer}</strong><br><br>${q.feedback.replace(/\n/g,'<br>')}<br><br>💜 <a href="patterns.html?pattern=${q.patternId}" style="color:var(--accent-purple);">${q.answer} 자세히 보기 →</a>`
  }

  document.getElementById('nextBtn').style.display = 'block'
  document.getElementById('scoreText').textContent = `✅ ${score}`
}

function nextQuestion() {
  current++
  if (current >= QUIZ.length) {
    showScore()
  } else {
    renderQuiz()
  }
}

function updateProgress() {
  const pct = ((current + 1) / QUIZ.length * 100).toFixed(0)
  document.getElementById('progressFill').style.width = pct + '%'
  document.getElementById('progressText').textContent = `${current + 1} / ${QUIZ.length}`
  document.getElementById('scoreText').textContent = `✅ ${score}`
}

function toggleHint(el) {
  const c = el.querySelector('.hint-content')
  c.style.display = c.style.display === 'block' ? 'none' : 'block'
}

function showScore() {
  document.getElementById('quizCard').style.display = 'none'
  document.getElementById('progressFill').style.width = '100%'
  document.getElementById('progressText').textContent = `${QUIZ.length} / ${QUIZ.length}`

  const screen = document.getElementById('scoreScreen')
  screen.style.display = 'block'

  const pct = score / QUIZ.length
  let emoji, desc
  if (pct === 1)       { emoji = '🏆'; desc = '완벽해요! 디자인 패턴 마스터!' }
  else if (pct >= 0.8) { emoji = '🎉'; desc = '훌륭합니다! 거의 다 맞췄어요!' }
  else if (pct >= 0.5) { emoji = '💪'; desc = '절반 이상 맞췄어요. 한 번 더 도전해봐요!' }
  else                  { emoji = '📖'; desc = '패턴 탐색기에서 복습 후 다시 도전!' }

  document.getElementById('scoreEmoji').textContent = emoji
  document.getElementById('scoreFraction').textContent = `${score} / ${QUIZ.length}`
  document.getElementById('scoreDesc').textContent = desc

  const wrong = QUIZ.length - score
  document.getElementById('statsRow').innerHTML = `
    <span class="stat-pill green">✅ 정답 ${score}개</span>
    <span class="stat-pill red">❌ 오답 ${wrong}개</span>
  `

  const reviewHtml = QUIZ.map((q, i) => {
    const ok = answered[i] === 'correct'
    return `
      <div class="review-item ${ok ? 'ok' : 'bad'}">
        <span style="font-size:1.2rem;">${ok ? '✅' : '❌'}</span>
        <div>
          <div style="font-weight:600;font-size:0.88rem;">${q.q}</div>
          <div style="color:var(--text-muted);font-size:0.8rem;">정답: ${q.answer}</div>
        </div>
        <a href="patterns.html?pattern=${q.patternId}" style="margin-left:auto;color:var(--accent-purple);font-size:0.78rem;white-space:nowrap;">복습 →</a>
      </div>`
  }).join('')

  document.getElementById('reviewList').innerHTML = `
    <div style="font-size:0.9rem;font-weight:700;margin-bottom:12px;color:var(--text-secondary);">📋 문제별 결과</div>
    ${reviewHtml}
  `
}

function restartQuiz() {
  current = 0; score = 0
  answered = new Array(QUIZ.length).fill(null)
  document.getElementById('scoreScreen').style.display = 'none'
  document.getElementById('quizCard').style.display = 'block'
  // Shuffle questions
  QUIZ.sort(() => Math.random() - 0.5)
  renderQuiz()
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

document.addEventListener('DOMContentLoaded', () => {
  QUIZ.sort(() => Math.random() - 0.5)
  renderQuiz()
})
</script>
</body>
</html>
